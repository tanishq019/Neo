name: prashant
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.10.0
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.5
  logger: ^2.7.0
  provider: ^6.1.5+1
  just_audio: ^0.10.6
  audio_session: ^0.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/albums/
    - assets/images/login/

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-VariableFont_wght.ttf